---
# roles/waf/tasks/main.yml
# Nginx Reverse Proxy + ModSecurity(v3) + OWASP CRS
# 목표:
#  - 재배포 시 중복 include/RuleID 중복 방지
#  - DetectionOnly / On 전환 가능
#  - Demo(발표)용 403 차단 룰 옵션 제공
#  - Offline 모드 지원
#  - Nginx ModSecurity module(load_module) 보장

- name: Set variables (defaults, but keep overrides)
  set_fact:
    waf_backend: "{{ waf_backend | default('http://10.2.2.101:30080') }}"
    waf_servername: "{{ waf_servername | default('waf.local') }}"
    waf_cert: "{{ waf_cert | default('/etc/pki/tls/certs/waf.crt') }}"
    waf_key: "{{ waf_key | default('/etc/pki/tls/private/waf.key') }}"
    waf_rule_engine: "{{ waf_rule_engine | default('DetectionOnly') }}"      # DetectionOnly / On
    waf_demo_block_enable: "{{ waf_demo_block_enable | default(false) }}"    # true면 ?test=1 403 보장
    waf_audit_enable: "{{ waf_audit_enable | default(false) }}"
    waf_offline: "{{ waf_offline | default(false) }}"

    # Nginx/ModSecurity 경로(표준화)
    modsec_base: "{{ modsec_base | default('/etc/nginx/modsecurity.d') }}"
    crs_dir: "{{ crs_dir | default('/etc/nginx/modsecurity.d/owasp-crs') }}"
    crs_rules_enabled: "{{ crs_rules_enabled | default('/etc/nginx/modsecurity.d/owasp-crs/rules-enabled') }}"
    modsec_main_conf: "{{ modsec_main_conf | default('/etc/nginx/modsecurity.conf') }}"
    modsec_custom_rules: "{{ modsec_custom_rules | default('/etc/nginx/modsecurity.d/modsecurity_custom.conf') }}"
    modsec_demo_rules: "{{ modsec_demo_rules | default('/etc/nginx/modsecurity.d/zz-test-rule.conf') }}"

    # ✅ WAF2에서 검증된 nginx 기본 모듈 경로 (상대경로 꼬임 방지)
    nginx_modsec_module_path: "{{ nginx_modsec_module_path | default('/usr/share/nginx/modules/ngx_http_modsecurity_module.so') }}"

# 0) Apache 충돌 방지(포트 80/443)
- name: Stop/disable httpd if present (best effort)
  systemd:
    name: httpd
    enabled: false
    state: stopped
  failed_when: false

# 1) Packages / Services (offline면 스킵)
- block:
    - name: Install required packages
      dnf:
        name:
          - nginx
          - git
          - firewalld
          - openssl
        state: present

    - name: Enable and start firewalld
      systemd:
        name: firewalld
        enabled: true
        state: started
  when:
    - not ansible_check_mode
    - not (waf_offline | bool)

- name: Open 80/443 on firewalld (public) (best effort)
  command: firewall-cmd --permanent --add-service={{ item }}
  loop: [http, https]
  register: r_fw
  failed_when: false
  changed_when: "'success' in (r_fw.stdout | lower)"

- name: Reload firewalld (best effort)
  command: firewall-cmd --reload
  register: r_fw_reload
  failed_when: false
  changed_when: "'success' in (r_fw_reload.stdout | lower)"

# 2) TLS cert (self-signed if missing)
- name: Check cert/key exist
  stat:
    path: "{{ item }}"
  loop:
    - "{{ waf_cert }}"
    - "{{ waf_key }}"
  register: r_tls

- name: Generate self-signed cert if missing (best effort)
  command: >
    openssl req -x509 -newkey rsa:2048 -nodes
    -keyout {{ waf_key }}
    -out {{ waf_cert }}
    -days 365
    -subj "/CN={{ waf_servername }}"
  when:
    - not ansible_check_mode
    - (r_tls.results[0].stat.exists == false) or (r_tls.results[1].stat.exists == false)
  failed_when: false

# 3) ModSecurity/CRS 디렉토리 준비
- name: Ensure ModSecurity base dir exists
  file:
    path: "{{ modsec_base }}"
    state: directory
    mode: "0755"

# audit log dir (선택)
- name: Ensure modsecurity log dir exists (best effort)
  file:
    path: /var/log/modsecurity
    state: directory
    mode: "0755"
  failed_when: false

- name: Cleanup old leftover CRS confs that can cause duplicate rules (nginx paths)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ modsec_base }}/crs-setup.conf"
    - "{{ modsec_base }}/owasp-crs.conf"
    - "{{ modsec_base }}/owasp-crs.conf.bak"
  ignore_errors: true

- name: Clone OWASP CRS if not exists (skip in offline mode)
  git:
    repo: "https://github.com/coreruleset/coreruleset.git"
    dest: "{{ crs_dir }}"
    version: "v4.12.0"
    update: false
  when:
    - not ansible_check_mode
    - not (waf_offline | bool)
  failed_when: false

- name: Ensure CRS setup conf present (skip in offline mode)
  copy:
    remote_src: true
    src: "{{ crs_dir }}/crs-setup.conf.example"
    dest: "{{ crs_dir }}/crs-setup.conf"
    owner: root
    group: root
    mode: "0644"
  when:
    - not ansible_check_mode
    - not (waf_offline | bool)
  failed_when: false

- name: Ensure rules-enabled directory exists
  file:
    path: "{{ crs_rules_enabled }}"
    state: directory
    mode: "0755"

- name: Link CRS .conf into rules-enabled (best effort)
  command: bash -lc 'test -d {{ crs_dir }}/rules && ln -sf {{ crs_dir }}/rules/*.conf {{ crs_rules_enabled }}/ || true'
  changed_when: false

- name: Link CRS .data into rules-enabled (best effort)
  command: bash -lc 'test -d {{ crs_dir }}/rules && ls {{ crs_dir }}/rules/*.data >/dev/null 2>&1 && ln -sf {{ crs_dir }}/rules/*.data {{ crs_rules_enabled }}/ || true'
  changed_when: false

# 4) ModSecurity 메인 설정/커스텀 룰(단일화)
# ⚠️ 파일명 통일: mod_security.conf.j2 / mod_security_custom.conf.j2 사용
- name: Deploy ModSecurity main config (loads CRS + custom rules)
  template:
    src: mod_security.conf.j2
    dest: "{{ modsec_main_conf }}"
    owner: root
    group: root
    mode: "0644"

- name: Deploy modsecurity custom rules (single source of truth)
  template:
    src: mod_security_custom.conf.j2
    dest: "{{ modsec_custom_rules }}"
    owner: root
    group: root
    mode: "0644"

# 5) 발표용 403 보장 룰 (옵션)
- name: Deploy demo blocking rule (optional)
  template:
    src: zz-test-rule.conf.j2
    dest: "{{ modsec_demo_rules }}"
    owner: root
    group: root
    mode: "0644"
  when: waf_demo_block_enable | bool

- name: Remove demo blocking rule when disabled
  file:
    path: "{{ modsec_demo_rules }}"
    state: absent
  when: not (waf_demo_block_enable | bool)

# 6) Nginx WAF vhost 배포
- name: Deploy Nginx WAF server block (reverse proxy to backend)
  template:
    src: nginx-waf.conf.j2
    dest: /etc/nginx/conf.d/waf.conf
    owner: root
    group: root
    mode: "0644"

# 7) ✅ nginx.conf에 load_module 절대경로 삽입(없을 때만)
- name: Check nginx.conf has modsecurity load_module
  shell: "grep -nE '^\\s*load_module\\s+.*ngx_http_modsecurity_module\\.so\\s*;' /etc/nginx/nginx.conf || true"
  register: r_loadmod
  changed_when: false
  failed_when: false

- name: Ensure load_module line present at top (best effort)
  lineinfile:
    path: /etc/nginx/nginx.conf
    insertbefore: BOF
    line: "load_module {{ nginx_modsec_module_path }};"
    state: present
  when: r_loadmod.stdout | length == 0
  failed_when: false

# 8) Validate + restart
- name: Validate Nginx config (best effort)
  command: nginx -t
  changed_when: false
  failed_when: false

- name: Enable and restart nginx (best effort)
  systemd:
    name: nginx
    enabled: true
    state: restarted
  failed_when: false

