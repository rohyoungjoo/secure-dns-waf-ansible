# 테스트 환경: DNS/외부 repo 없이도 플레이북이 끝까지 돌도록
waf_offline: false

# 테스트에서는 탐지 모드 추천
waf_rule_engine: "On"

# Ingress VIP 없이 테스트할 때(프록시 백엔드 의미없게)
waf_backend: "http://10.2.2.101:30080"
waf_servername: "cafekec.shop"

# TLS 경로 (nginx-waf.conf.j2에서 필요)
waf_cert: "/etc/pki/tls/certs/waf.crt"
waf_key: "/etc/pki/tls/private/waf.key"
